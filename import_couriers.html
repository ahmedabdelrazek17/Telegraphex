window.startImport = async function() {
  const btn = document.getElementById('importBtn');
  btn.disabled = true;
  btn.textContent = 'جاري الرفع...';
  document.getElementById('progressDiv').style.display = 'block';
  document.getElementById('logDiv').style.display = 'block';

  const log = document.getElementById('logDiv');
  const fill = document.getElementById('progressFill');
  const status = document.getElementById('statusText');

  let success = 0, failed = 0;

  for (let i = 0; i < couriers.length; i++) {
    try {
      await addDoc(collection(db, 'couriers'), couriers[i]);
      success++;
      log.innerHTML += `<div class="success">✅ ${couriers[i].name}</div>`;
    } catch(e) {
      failed++;
      log.innerHTML += `<div class="error">❌ ${couriers[i].name}: ${e.message}</div>`;
    }
    log.scrollTop = log.scrollHeight;
    const pct = Math.round(((i+1)/couriers.length)*100);
    fill.style.width = pct + '%';
    status.textContent = `${i+1} من ${couriers.length} (${pct}%)`;
    await new Promise(r => setTimeout(r, 80));
  }

  status.textContent = `✅ تم: ${success} | ❌ فشل: ${failed}`;
  document.getElementById('doneMsg').style.display = 'block';
  btn.textContent = '✅ تم الرفع';
};
</script>
